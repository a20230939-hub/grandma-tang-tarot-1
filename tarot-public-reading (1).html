<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>湯婆婆塔羅｜妳在愛情路上的絆腳石</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --indigo: #0f0c2a;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --moonlight: #d4cef5;
    --text-soft: #b0a8d0;
    --card-border: rgba(180,150,255,0.25);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Serif TC', serif;
    background: var(--indigo);
    color: var(--moonlight);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Nebula bg */
  .nebula {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(80,40,160,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(120,50,180,0.25) 0%, transparent 55%),
      radial-gradient(ellipse 100% 80% at 50% 50%, rgba(15,12,42,1) 0%, transparent 100%);
  }
  .orb {
    position: fixed; border-radius: 50%; filter: blur(60px);
    pointer-events: none; z-index: 0; animation: drift linear infinite;
  }
  .orb1 { width:300px;height:300px;background:rgba(80,30,160,0.2);top:-10%;left:-15%;animation-duration:30s; }
  .orb2 { width:200px;height:200px;background:rgba(140,50,200,0.15);bottom:10%;right:-10%;animation-duration:22s;animation-direction:reverse; }
  @keyframes drift {
    0%   { transform: translate(0,0); }
    33%  { transform: translate(30px,20px); }
    66%  { transform: translate(-20px,40px); }
    100% { transform: translate(0,0); }
  }
  #starfield { position:fixed;inset:0;z-index:0;pointer-events:none; }
  #starfield canvas { width:100%;height:100%; }

  .page-wrap {
    position: relative; z-index: 1;
    max-width: 480px; margin: 0 auto; padding: 0 20px 80px;
  }

  /* Header */
  .header { text-align:center; padding: 40px 0 24px; animation: fadeUp 0.8s ease both; }
  .brand-logo {
    width: 90px; height: 90px; object-fit: contain; border-radius: 50%;
    filter: drop-shadow(0 0 18px rgba(180,140,255,0.4)) drop-shadow(0 0 6px rgba(201,168,76,0.25));
    margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto;
  }
  .question-title {
    font-size: clamp(24px, 6.5vw, 32px);
    font-weight: 600; line-height: 1.5;
    color: var(--moonlight);
    text-shadow: 0 0 40px rgba(150,100,255,0.4);
    letter-spacing: 1px;
  }
  .question-title em { font-style:normal; color: var(--gold-light); }

  /* Step dots */
  .steps { display:flex;justify-content:center;gap:8px;margin:24px 0 16px; }
  .dot { width:7px;height:7px;border-radius:50%;background:var(--card-border);transition:background 0.3s; }
  .dot.active { background:var(--gold);box-shadow:0 0 8px var(--gold); }

  /* Instruction */
  .instruction {
    text-align:center; font-size:13px; color:var(--text-soft);
    letter-spacing:1.5px; line-height:2; margin-bottom:28px;
    animation: fadeUp 0.8s 0.3s ease both; opacity:0;
  }

  /* Cards row */
  .cards-row {
    display: flex; justify-content: center;
    gap: 16px; margin-bottom: 12px;
    perspective: 1000px;
  }

  .card-wrap {
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
    flex: 0 0 auto;
    animation: fadeUp 0.7s ease both;
  }
  .card-wrap:nth-child(1) { animation-delay: 0.2s; }
  .card-wrap:nth-child(2) { animation-delay: 0.4s; }
  .card-wrap:nth-child(3) { animation-delay: 0.6s; }

  .tarot-card {
    width: 105px; height: 170px;
    border-radius: 12px;
    border: 1px solid var(--card-border);
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: transform 0.35s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.35s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .tarot-card img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    border-radius: 12px;
  }

  /* hover */
  .tarot-card:hover {
    transform: translateY(-8px) scale(1.04);
    box-shadow: 0 20px 40px rgba(100,60,200,0.45), 0 0 24px rgba(200,168,255,0.2);
  }

  /* selected state */
  .tarot-card.selected {
    border: 2px solid var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.25), 0 20px 50px rgba(100,60,200,0.5), 0 0 40px rgba(201,168,76,0.3);
    transform: translateY(-10px) scale(1.06);
    animation: selectedPulse 2s ease infinite;
  }
  /* dimmed unselected */
  .tarot-card.dimmed {
    opacity: 0.4;
    transform: scale(0.96);
    filter: grayscale(30%);
    pointer-events: none;
  }

  @keyframes selectedPulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(201,168,76,0.25), 0 20px 50px rgba(100,60,200,0.5), 0 0 30px rgba(201,168,76,0.25); }
    50%      { box-shadow: 0 0 0 5px rgba(201,168,76,0.4),  0 20px 50px rgba(100,60,200,0.6), 0 0 50px rgba(201,168,76,0.45); }
  }

  /* gold shimmer overlay on hover */
  .tarot-card::after {
    content:''; position:absolute; inset:0; border-radius:12px;
    background: linear-gradient(115deg, transparent 40%, rgba(220,190,255,0.07) 50%, transparent 60%);
    background-size: 200% 100%;
    animation: shimmer 4s infinite;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .card-label { font-size:13px; color:var(--text-soft); letter-spacing:2px; }

  /* Reading box */
  .reading-box {
    margin-top: 28px;
    border-radius: 18px;
    border: 1px solid rgba(180,150,255,0.2);
    background: rgba(20,14,55,0.75);
    backdrop-filter: blur(16px);
    padding: 24px 20px;
    display: none;
  }
  .reading-box.visible {
    display: block;
    animation: fadeUp 0.6s ease forwards;
  }
  .reading-title {
    font-size: 13px; letter-spacing: 3px; color: var(--gold);
    text-align: center; margin-bottom: 16px;
  }
  .reading-content {
    font-size: 15px; line-height: 2;
    color: var(--moonlight); text-align: justify;
  }
  .reading-section {
    display: block; color: var(--gold-light);
    font-size: 13px; letter-spacing: 2px;
    margin-top: 16px; margin-bottom: 4px;
  }

  /* Star divider */
  .star-divider {
    text-align:center; margin:24px 0 8px;
    color:var(--gold); font-size:13px; letter-spacing:8px; opacity:0.5;
  }

  /* CTA */
  .cta-block {
    margin-top: 28px; border-radius: 20px;
    border: 1px solid rgba(201,168,76,0.25);
    background: rgba(15,10,40,0.75);
    backdrop-filter: blur(16px);
    padding: 28px 20px 24px; text-align: center;
  }
  .cta-heading { font-size:17px; color:var(--moonlight); margin-bottom:12px; letter-spacing:1px; }
  .cta-sub { font-size:14px; color:var(--text-soft); line-height:2; letter-spacing:0.5px; margin-bottom:24px; }
  .cta-btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, #6b3fa0 0%, #3d1f80 100%);
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold-light);
    font-family: 'Noto Serif TC', serif;
    font-size: 16px; letter-spacing: 2px;
    padding: 16px 32px; border-radius: 50px;
    cursor: pointer; text-decoration: none;
    transition: all 0.3s;
    box-shadow: 0 4px 24px rgba(100,50,180,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(100,50,180,0.6), 0 0 20px rgba(201,168,76,0.2);
  }
  .cta-note { margin-top:12px; font-size:12px; color:var(--text-soft); opacity:0.6; letter-spacing:0.5px; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }
</style>
</head>

<script>
/* Starfield */
(function(){
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function initStars(){
    stars = [];
    const n = Math.floor((W*H)/3000);
    for(let i=0;i<n;i++) stars.push({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.4+0.2,
      speed:Math.random()*0.003+0.001,
      phase:Math.random()*Math.PI*2
    });
  }
  function draw(t){
    ctx.clearRect(0,0,W,H);
    for(const s of stars){
      const a = 0.3 + 0.5*Math.abs(Math.sin(t*s.speed+s.phase));
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(220,210,255,${a})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  resize(); initStars(); requestAnimationFrame(draw);
  window.addEventListener('resize',()=>{ resize(); initStars(); });
})();

/* Card data */

let selected = null;

function selectCard(id) {
  if(selected === id) return;
  selected = id;

  // Update card states
  ['A','B','C'].forEach(k => {
    const el = document.getElementById('card'+k);
    el.classList.remove('selected','dimmed');
    if(k === id) el.classList.add('selected');
    else el.classList.add('dimmed');
  });

  // Update dots
  const dotMap = { A:'d2', B:'d3', C:'d4' };
  document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
  document.getElementById('d1').classList.add('active');
  document.getElementById(dotMap[id]).classList.add('active');

  // Show reading
  const data = CARDS[id];
  const box = document.getElementById('readingBox');
  const title = document.getElementById('readingTitle');
  const content = document.getElementById('readingContent');

  title.textContent = `✦ 妳選了「${data.name}」 ✦`;
  content.innerHTML = data.reading
    .replace(/\n\n/g,'<br><br>')
    .replace(/\n/g,'<br>')
    .replace(/【(.+?)】/g,'<span class="reading-section">【$1】</span>');

  box.classList.remove('visible');
  void box.offsetWidth; // reflow for re-animation
  box.classList.add('visible');

  setTimeout(() => {
    box.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 100);
}
